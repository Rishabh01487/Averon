<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Averon — Enterprise blockchain platform for tokenizing real-world assets with AI-powered valuation and decentralized trading.">
  <title>Averon — Asset Tokenization Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ═══ AUTH OVERLAY ═══ -->
  <div id="authOverlay" class="auth-overlay">
    <div class="auth-container">
      <div class="auth-header">
        <div class="logo-large">Averon</div>
        <p class="auth-subtitle">Enterprise Asset Tokenization Platform</p>
        <p class="auth-tagline">SHA-256 Blockchain · ECDSA Wallets · AI Valuation</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary btn-full">Sign In →</button>
